<svg width="100%" viewBox="0 0 680 770" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <title>GraphRAG + Analytics architecture</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t{font-size:14px;font-weight:600;} .ts{font-size:12px;fill:#5F5E5A;}
      .teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.8;} .teal .t{fill:#085041;}
      .coral rect{fill:#FAECE7;stroke:#993C1D;stroke-width:.8;} .coral .t{fill:#4A1B0C;}
      .amber rect{fill:#FAEEDA;stroke:#854F0B;stroke-width:.8;} .amber .t{fill:#412402;}
      .purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:.8;} .purple .t{fill:#26215C;}
      .green rect{fill:#EAF3DE;stroke:#3B6D11;stroke-width:.8;} .green .t{fill:#173404;}
      .gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.8;} .gray .t{fill:#2C2C2A;}
      .arr{stroke:#888780;stroke-width:1;fill:none;} .dash{stroke:#B4B2A9;stroke-width:.8;fill:none;stroke-dasharray:4 3;}
      .div{stroke:#D3D1C7;stroke-width:.5;stroke-dasharray:4 4;}
    </style>
  </defs>
  <rect x="0" y="0" width="680" height="770" fill="white"/>

  <text class="ts" x="50" y="32">INGESTION — runs once per PDF</text>
  <g class="gray"><rect x="50" y="44" width="150" height="50" rx="8"/><text class="t" x="125" y="66" text-anchor="middle">PDF upload</text><text class="ts" x="125" y="82" text-anchor="middle">extract + chunk</text></g>
  <g class="gray"><rect x="265" y="44" width="150" height="50" rx="8"/><text class="t" x="340" y="66" text-anchor="middle">Embed chunks</text><text class="ts" x="340" y="82" text-anchor="middle">384-dim vectors</text></g>
  <g class="coral"><rect x="480" y="44" width="150" height="50" rx="8"/><text class="t" x="555" y="66" text-anchor="middle">Extract entities</text><text class="ts" x="555" y="82" text-anchor="middle">LLM to graph facts</text></g>
  <line x1="200" y1="69" x2="263" y2="69" class="arr" marker-end="url(#arrow)"/>
  <line x1="415" y1="69" x2="478" y2="69" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="94" x2="340" y2="150" class="arr" marker-end="url(#arrow)"/>
  <line x1="555" y1="94" x2="555" y2="150" class="arr" marker-end="url(#arrow)"/>

  <g class="teal"><rect x="200" y="150" width="280" height="56" rx="10"/><text class="t" x="340" y="174" text-anchor="middle">FAISS vector store</text><text class="ts" x="340" y="192" text-anchor="middle">chunk embeddings - semantic search</text></g>
  <g class="coral"><rect x="490" y="150" width="140" height="56" rx="10"/><text class="t" x="560" y="174" text-anchor="middle">Neo4j graph</text><text class="ts" x="560" y="192" text-anchor="middle">entities + edges</text></g>

  <line x1="40" y1="240" x2="640" y2="240" class="div"/>
  <text class="ts" x="50" y="268">GRAPHRAG QUERY LAYER — per question</text>
  <g class="gray"><rect x="50" y="282" width="150" height="50" rx="8"/><text class="t" x="125" y="304" text-anchor="middle">User question</text><text class="ts" x="125" y="320" text-anchor="middle">+ safety guardrail</text></g>
  <g class="purple"><rect x="265" y="270" width="230" height="120" rx="12"/><text class="t" x="380" y="292" text-anchor="middle">Hybrid retrieval</text></g>
  <g class="teal"><rect x="282" y="306" width="92" height="64" rx="8"/><text class="ts" x="328" y="330" text-anchor="middle">vector</text><text class="ts" x="328" y="348" text-anchor="middle">similarity</text></g>
  <g class="coral"><rect x="386" y="306" width="92" height="64" rx="8"/><text class="ts" x="432" y="330" text-anchor="middle">graph</text><text class="ts" x="432" y="348" text-anchor="middle">traversal</text></g>
  <g class="gray"><rect x="540" y="282" width="100" height="50" rx="8"/><text class="t" x="590" y="304" text-anchor="middle">Rerank</text><text class="ts" x="590" y="320" text-anchor="middle">+ LLM answer</text></g>
  <line x1="200" y1="307" x2="263" y2="307" class="arr" marker-end="url(#arrow)"/>
  <line x1="495" y1="307" x2="538" y2="307" class="arr" marker-end="url(#arrow)"/>
  <path d="M340 206 L340 250 L328 250 L328 304" class="dash" marker-end="url(#arrow)"/>
  <path d="M560 206 L560 250 L432 250 L432 304" class="dash" marker-end="url(#arrow)"/>
  <line x1="590" y1="332" x2="590" y2="372" class="arr" marker-end="url(#arrow)"/>
  <g class="teal"><rect x="515" y="372" width="125" height="46" rx="8"/><text class="ts" x="577" y="390" text-anchor="middle">Cited answer</text><text class="ts" x="577" y="406" text-anchor="middle">file + page</text></g>

  <line x1="40" y1="452" x2="640" y2="452" class="div"/>
  <text class="ts" x="50" y="480">BUSINESS ANALYTICS LAYER — generates the output</text>
  <g class="amber"><rect x="50" y="494" width="160" height="56" rx="8"/><text class="t" x="130" y="518" text-anchor="middle">Extract metrics</text><text class="ts" x="130" y="536" text-anchor="middle">revenue - profit - %</text></g>
  <g class="amber"><rect x="260" y="494" width="160" height="56" rx="8"/><text class="t" x="340" y="518" text-anchor="middle">KPI engine</text><text class="ts" x="340" y="536" text-anchor="middle">totals - trends - ranks</text></g>
  <g class="amber"><rect x="470" y="494" width="160" height="56" rx="8"/><text class="t" x="550" y="518" text-anchor="middle">Narrative</text><text class="ts" x="550" y="536" text-anchor="middle">grounded summary</text></g>
  <line x1="210" y1="522" x2="258" y2="522" class="arr" marker-end="url(#arrow)"/>
  <line x1="420" y1="522" x2="468" y2="522" class="arr" marker-end="url(#arrow)"/>
  <line x1="550" y1="550" x2="550" y2="586" class="arr" marker-end="url(#arrow)"/>
  <path d="M340 550 L340 568 L300 568 L300 586" class="dash" marker-end="url(#arrow)"/>
  <g class="green"><rect x="200" y="586" width="430" height="64" rx="12"/><text class="t" x="415" y="612" text-anchor="middle">Auto-generated Word report</text><text class="ts" x="415" y="632" text-anchor="middle">exec summary - KPI tables - charts - graph hubs - citations</text></g>

  <text class="ts" x="340" y="694" text-anchor="middle">LEGEND</text>
  <rect x="70" y="708" width="13" height="13" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width=".8"/><text class="ts" x="89" y="719">Vector / FAISS</text>
  <rect x="200" y="708" width="13" height="13" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width=".8"/><text class="ts" x="219" y="719">Graph / Neo4j</text>
  <rect x="330" y="708" width="13" height="13" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width=".8"/><text class="ts" x="349" y="719">Hybrid GraphRAG</text>
  <rect x="478" y="708" width="13" height="13" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width=".8"/><text class="ts" x="497" y="719">Analytics</text>
  <rect x="588" y="708" width="13" height="13" rx="3" fill="#EAF3DE" stroke="#3B6D11" stroke-width=".8"/><text class="ts" x="607" y="719">Output</text>
</svg>
